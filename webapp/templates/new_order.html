{% extends 'base.html' %}
{% block content %}


{% if user.is_authenticated %}

<h1>Add New Order</h1>

<form method="POST" >
	{% csrf_token %}

    {{ form.as_p }}

    <br/>
    <button type="submit" class="btn btn-secondary">Update</button>
    <a href="{% url 'home' %}" class="btn btn-info">Cancel</a>
</form>

{% endif %}

{% endblock %}
